<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masuk - Healthy Secret PO</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #0a74da; --accent: #d4af37; --light-bg: #f9fbfd; }
        body { background-color: var(--light-bg); font-family: 'Poppins', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; position: relative; overflow-x: hidden; overflow-y: auto; padding: 40px 20px; box-sizing: border-box; }
        .floating-shape { position: fixed; border-radius: 50%; filter: blur(80px); z-index: 1; opacity: 0.5; animation: float 10s infinite alternate; pointer-events: none; }
        .shape-1 { top: -10%; left: -10%; width: 500px; height: 500px; background: rgba(212, 175, 55, 0.2); }
        .shape-2 { bottom: -10%; right: -5%; width: 400px; height: 400px; background: rgba(10, 116, 218, 0.15); }
        @keyframes float { 0% { transform: translateY(0); } 100% { transform: translateY(30px); } }
        .auth-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); padding: 40px 30px; border-radius: 20px; box-shadow: 0 15px 40px rgba(0,0,0,0.08); width: 100%; max-width: 450px; position: relative; z-index: 10; border: 1px solid rgba(255,255,255,0.5); transition: all 0.3s ease; margin: auto; }
        .brand-title { font-family: 'Playfair Display', serif; color: var(--primary); font-weight: 700; font-size: 2rem; text-align: center; margin-bottom: 5px; }
        .brand-subtitle { text-align: center; color: #666; font-size: 13px; margin-bottom: 30px; transition: 0.3s; }
        .form-label { font-size: 13px; font-weight: 600; color: #444; }
        .form-control { border-radius: 10px; padding: 12px 15px; border: 1px solid #ddd; font-size: 14px; transition: 0.3s; }
        .form-control:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(10, 116, 218, 0.1); }
        .captcha-container { background: #f8faff; border: 1px solid #ddd; padding: 15px; border-radius: 10px; margin-bottom: 20px; text-align: center; position: relative;}
        .puzzle-box { position: relative; width: 100%; max-width: 320px; height: 150px; margin: 0 auto 15px auto; border-radius: 8px; overflow: hidden; box-shadow: inset 0 0 10px rgba(0,0,0,0.1); background-color: #eee;}
        #mainCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        #pieceCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none; }
        .slider-container { display: flex; align-items: center; justify-content: center; gap: 10px; padding: 0 10px;}
        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 35px; width: 35px; border-radius: 50%; background: var(--primary); cursor: pointer; box-shadow: 0 2px 6px rgba(0,0,0,0.3); border: 3px solid #fff; margin-top: -12px; transition: background 0.3s;}
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 10px; cursor: pointer; background: #ddd; border-radius: 10px; border: 1px solid #ccc; }
        input[type=range]:focus { outline: none; }
        .captcha-status { font-size: 12px; font-weight: bold; margin-top: 10px; color: #666; transition: 0.3s;}
        .captcha-success { color: #25d366 !important; }
        .captcha-fail { color: #dc3545 !important; }
        .btn-primary-custom { background: var(--primary); color: white; border: none; border-radius: 50px; padding: 12px; font-weight: 600; font-size: 15px; transition: 0.3s; width: 100%; }
        .btn-primary-custom:hover { background: #085ba8; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(10, 116, 218, 0.3); }
        .btn-primary-custom:disabled { background: #b0b0b0; cursor: not-allowed; transform: none; box-shadow: none; }
        .toggle-mode-btn { transition: 0.3s; cursor: pointer; }
        .toggle-mode-btn:hover { color: var(--primary) !important; }
    </style>
</head>
<body>

    <div class="floating-shape shape-1"></div>
    <div class="floating-shape shape-2"></div>

    <div class="auth-card" id="authCard">
        <div class="brand-title">Healthy Secret 🌿</div>
        <div class="brand-subtitle" id="formSubtitle">Silakan isi data untuk mendaftar atau masuk.</div>

        <form id="authForm">
            <div id="userFields">
                <div class="mb-3">
                    <label class="form-label">👤 Nama Lengkap</label>
                    <input type="text" id="userName" class="form-control" placeholder="Contoh: Budi Santoso">
                </div>
                <div class="mb-3">
                    <label class="form-label">📱 Nomor WhatsApp Aktif</label>
                    <input type="number" id="userPhone" class="form-control" placeholder="Contoh: 08123456789">
                    <small class="text-success" style="font-size:11px;">*Jika sudah terdaftar, nomor ini akan digunakan untuk Login.</small>
                </div>
                <div class="mb-3">
                    <label class="form-label">📍 Alamat Pengiriman (Opsional)</label>
                    <textarea id="userAddress" class="form-control" rows="2" placeholder="Masukkan alamat lengkap..."></textarea>
                </div>
            </div>

            <div id="adminFields" style="display: none;">
                <div class="mb-3">
                    <label class="form-label">👤 Username Admin</label>
                    <input type="text" id="adminUser" class="form-control" placeholder="Ketik: admin">
                </div>
                <div class="mb-4">
                    <label class="form-label">🔑 Password Admin</label>
                    <input type="password" id="adminPass" class="form-control" placeholder="Ketik: medan2026">
                </div>
            </div>

            <label class="form-label mt-2">🛡️ Verifikasi Keamanan (Geser Puzzle)</label>
            <div class="captcha-container">
                <div class="puzzle-box">
                    <canvas id="mainCanvas"></canvas>
                    <canvas id="pieceCanvas"></canvas>
                </div>
                <div class="slider-container">
                    <input type="range" id="puzzleSlider" min="0" max="250" value="0" disabled>
                </div>
                <div id="captchaStatus" class="captcha-status">Tarik slider untuk mencocokkan puzzle</div>
            </div>

            <button type="submit" id="submitBtn" class="btn-primary-custom" disabled>Kirim OTP ke WhatsApp ➜</button>
        </form>

        <div class="text-center mt-4 border-top pt-3">
            <a href="#" id="toggleModeBtn" class="text-muted text-decoration-none small fw-bold toggle-mode-btn">
                🔒 Masuk sebagai Admin
            </a>
        </div>
    </div>

    <script>
        let currentMode = 'user'; 

        document.getElementById('toggleModeBtn').addEventListener('click', function(e) {
            e.preventDefault();
            
            const userFields = document.getElementById('userFields');
            const adminFields = document.getElementById('adminFields');
            const submitBtn = document.getElementById('submitBtn');
            const formSubtitle = document.getElementById('formSubtitle');

            if(currentMode === 'user') {
                currentMode = 'admin';
                userFields.style.display = 'none';
                adminFields.style.display = 'block';
                submitBtn.innerText = 'Login ke Dashboard Admin ➜';
                submitBtn.style.backgroundColor = '#d4af37'; 
                formSubtitle.innerText = 'Portal Keamanan Khusus Administrator.';
                this.innerHTML = '👤 Kembali sebagai Pembeli';
            } else {
                currentMode = 'user';
                userFields.style.display = 'block';
                adminFields.style.display = 'none';
                submitBtn.innerText = 'Kirim OTP ke WhatsApp ➜';
                submitBtn.style.backgroundColor = '#0a74da';
                formSubtitle.innerText = 'Silakan isi data untuk mendaftar atau masuk.';
                this.innerHTML = '🔒 Masuk sebagai Admin';
            }
            initCaptcha();
        });

        const mainCanvas = document.getElementById('mainCanvas');
        const pieceCanvas = document.getElementById('pieceCanvas');
        const mainCtx = mainCanvas.getContext('2d');
        const pieceCtx = pieceCanvas.getContext('2d');
        const slider = document.getElementById('puzzleSlider');
        const submitBtn = document.getElementById('submitBtn');
        const statusText = document.getElementById('captchaStatus');

        let puzzleX = 0; 
        let puzzleY = 0;
        const pieceSize = 45;
        let isVerified = false;

        function initCaptcha() {
            mainCanvas.width = 320; mainCanvas.height = 150;
            pieceCanvas.width = 320; pieceCanvas.height = 150;

            puzzleX = Math.floor(Math.random() * 100) + 150; 
            puzzleY = Math.floor(Math.random() * 80) + 20;

            let grad = mainCtx.createLinearGradient(0, 0, 320, 150);
            grad.addColorStop(0, "#0a74da");
            grad.addColorStop(1, "#d4af37");
            mainCtx.fillStyle = grad;
            mainCtx.fillRect(0, 0, 320, 150);
            
            mainCtx.fillStyle = "rgba(255, 255, 255, 0.1)";
            for(let i=0; i<20; i++) {
                mainCtx.beginPath();
                mainCtx.arc(Math.random()*320, Math.random()*150, Math.random()*20+10, 0, Math.PI*2);
                mainCtx.fill();
            }

            drawPuzzlePiece(mainCtx, puzzleX, puzzleY, "fill", "rgba(0,0,0,0.5)"); 
            
            pieceCtx.clearRect(0, 0, 320, 150);
            drawPuzzlePiece(pieceCtx, 10, puzzleY, "clip", ""); 
            
            let pieceGrad = pieceCtx.createLinearGradient(0, 0, 320, 150);
            pieceGrad.addColorStop(0, "#0a74da");
            pieceGrad.addColorStop(1, "#d4af37");
            pieceCtx.fillStyle = pieceGrad;
            pieceCtx.fillRect(10, puzzleY, pieceSize, pieceSize);
            pieceCtx.strokeStyle = "#fff";
            pieceCtx.lineWidth = 2;
            pieceCtx.stroke();
            
            slider.disabled = false;
            slider.value = 0;
            pieceCanvas.style.transform = `translateX(0px)`;
            isVerified = false;
            submitBtn.disabled = true;
            statusText.innerText = "Tarik slider untuk mencocokkan puzzle";
            statusText.className = "captcha-status";
        }

        function drawPuzzlePiece(ctx, x, y, operation, color) {
            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.lineTo(x + pieceSize / 2 - 5, y);
            ctx.arc(x + pieceSize / 2, y, 7, Math.PI, 0, false); 
            ctx.lineTo(x + pieceSize, y);
            ctx.lineTo(x + pieceSize, y + pieceSize / 2 - 5);
            ctx.arc(x + pieceSize, y + pieceSize / 2, 7, -Math.PI / 2, Math.PI / 2, false); 
            ctx.lineTo(x + pieceSize, y + pieceSize);
            ctx.lineTo(x, y + pieceSize);
            ctx.lineTo(x, y);
            ctx.closePath();

            if (operation === "fill") {
                ctx.fillStyle = color;
                ctx.fill();
                ctx.strokeStyle = "rgba(255,255,255,0.3)";
                ctx.stroke();
            } else if (operation === "clip") {
                ctx.clip();
            }
        }

        slider.addEventListener('input', function(e) {
            if(isVerified) return;
            let moveX = e.target.value;
            pieceCanvas.style.transform = `translateX(${moveX}px)`;
        });

        slider.addEventListener('change', function(e) {
            if(isVerified) return;
            let currentX = parseInt(e.target.value) + 10; 
            
            if (Math.abs(currentX - puzzleX) < 6) {
                isVerified = true;
                slider.disabled = true;
                statusText.innerText = "✔ Verifikasi Berhasil!";
                statusText.className = "captcha-status captcha-success";
                submitBtn.disabled = false; 
            } else {
                statusText.innerText = "❌ Posisi tidak pas! Coba lagi.";
                statusText.className = "captcha-status captcha-fail";
                setTimeout(initCaptcha, 800);
            }
        });

        window.onload = initCaptcha;

        document.getElementById('authForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            if(!isVerified) {
                alert("Harap selesaikan Puzzle CAPTCHA terlebih dahulu!");
                return;
            }

            if(currentMode === 'user') {
                const name = document.getElementById('userName').value;
                const phone = document.getElementById('userPhone').value;
                const address = document.getElementById('userAddress').value || "-";
                
                if(!name || !phone) {
                    alert("Nama dan Nomor WhatsApp wajib diisi!");
                    return;
                }

                const sanitize = (str) => str.replace(/</g, "&lt;").replace(/>/g, "&gt;");
                
                // --- FITUR BARU: MANAJEMEN DATABASE PELANGGAN (HS_USERS_DB) ---
                let usersDB = JSON.parse(localStorage.getItem('HS_USERS_DB')) || [];
                let existingUser = usersDB.find(u => u.phone === phone);
                
                if (existingUser) {
                    // Cek jika akun pelanggan diblokir oleh Admin
                    if (existingUser.status === 'blocked') {
                        alert("🚨 Akses Ditolak! Akun Anda telah ditangguhkan karena alasan tertentu. Silakan hubungi Admin.");
                        initCaptcha(); // Reset captha agar tidak bisa spam
                        return;
                    }
                    // Jika lolos, update nama & alamat terbarunya
                    existingUser.name = sanitize(name);
                    existingUser.address = sanitize(address);
                } else {
                    // Daftarkan pelanggan baru ke Database Admin
                    usersDB.push({ phone: sanitize(phone), name: sanitize(name), address: sanitize(address), status: 'active' });
                }
                localStorage.setItem('HS_USERS_DB', JSON.stringify(usersDB));

                // Simpan Sesi Login
                const data = { name: sanitize(name), phone: sanitize(phone), address: sanitize(address) };
                localStorage.setItem('hs_user_data', JSON.stringify(data));
                window.location.href = "otp.html";

            } else if(currentMode === 'admin') {
                const u = document.getElementById('adminUser').value;
                const p = document.getElementById('adminPass').value;
                
                if(u === "admin" && p === "medan2026") {
                    localStorage.setItem('HS_AUTH', 'true');
                    alert("Akses Diterima! Mengarahkan ke Dashboard Admin...");
                    window.location.href = "admin.html";
                } else {
                    alert("Akses Ditolak! Username atau Password Admin salah.");
                    initCaptcha(); 
                }
            }
        });
    </script>
</body>
</html>
