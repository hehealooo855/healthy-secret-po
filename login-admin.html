<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Healthy Secret</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { background: #0f172a; color: white; height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Poppins', sans-serif; margin: 0; }
        .login-card { background: #1e293b; padding: 40px; border-radius: 20px; width: 100%; max-width: 400px; border: 1px solid #334155; box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5); }
        .form-control { background: #0f172a; border: 1px solid #334155; color: white; padding: 12px; border-radius: 10px; }
        .form-control:focus { background: #0f172a; color: white; border-color: #3b82f6; box-shadow: none; }
        .btn-cyber { background: #3b82f6; border: none; font-weight: 600; color: white; padding: 12px; border-radius: 10px; transition: 0.3s; }
        .btn-cyber:hover { background: #2563eb; transform: translateY(-2px); }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="text-center mb-4">
            <h3 class="fw-bold text-primary mb-1">Admin Access</h3>
            <p class="text-secondary small">Healthy Secret Management System</p>
        </div>
        <div class="mb-3">
            <label class="small text-secondary mb-1">Username</label>
            <input type="text" id="user" class="form-control" placeholder="Ketik: admin">
        </div>
        <div class="mb-4">
            <label class="small text-secondary mb-1">Password</label>
            <input type="password" id="pass" class="form-control" placeholder="Ketik: medan2026">
        </div>
        <button onclick="login()" class="btn btn-cyber w-100">Sign In Securely</button>
    </div>

    <script>
        function login() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            if(u === "admin" && p === "medan2026") {
                localStorage.setItem('HS_AUTH', 'true');
                Swal.fire({ toast: true, position: 'top-end', icon: 'success', title: 'Login Berhasil!', showConfirmButton: false, timer: 1500 });
                setTimeout(() => window.location.href = 'admin.html', 1000);
            } else { 
                Swal.fire('Akses Ditolak', 'Username atau Password salah!', 'error'); 
            }
        }
    </script>
</body>
</html>
